<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia Social Media</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #00a859; text-align: center; }
        select, textarea, button { width: 100%; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #00a859; color: white; font-weight: bold; cursor: pointer; border: none; }
        #resultado { margin-top: 20px; white-space: pre-wrap; background: #f0fdf4; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌿 Generador Farmacéutico</h2>
        <select id="formato"><option>Post</option><option>Carrusel</option><option>Story</option></select>
        <select id="tipo"><option>Informativo</option><option>Producto nuevo</option><option>Oferta</option><option>Mito/Curiosidad</option></select>
        <textarea id="tema" placeholder="¿Sobre qué quieres escribir? (Ej: Vitamina C)"></textarea>
        <button id="btn">¡Generar Contenido!</button>
        <div id="resultado"></div>
    </div>
    <script>
        document.getElementById('btn').onclick = async () => {
            const resDiv = document.getElementById('resultado');
            resDiv.style.display = 'block'; resDiv.innerText = 'Generando... ⏳';
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    formato: document.getElementById('formato').value,
                    tipo: document.getElementById('tipo').value,
                    tema: document.getElementById('tema').value
                })
            });
            const data = await res.json();
            resDiv.innerText = data.content || 'Error al conectar';
        };
    </script>
</body>
</html>
