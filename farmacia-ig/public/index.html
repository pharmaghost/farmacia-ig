<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de contenido · Instagram Farmacia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-50: #EEEDFE;
      --purple-200: #AFA9EC;
      --purple-600: #534AB7;
      --purple-800: #3C3489;
      --gray-100: #f5f5f3;
      --gray-200: #e8e8e5;
      --gray-500: #888780;
      --gray-800: #2C2C2A;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--gray-800);
    }

    header p {
      font-size: 14px;
      color: var(--gray-500);
      margin-top: 4px;
    }

    .card {
      background: #fff;
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--gray-200);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--gray-500);
      margin-bottom: 10px;
    }

    .tab-bar {
      display: flex;
      border: 0.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .tab {
      flex: 1;
      padding: 9px;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      background: #fff;
      color: var(--gray-500);
      border: none;
      border-right: 0.5px solid var(--gray-200);
      transition: all 0.15s;
      font-family: inherit;
    }

    .tab:last-child { border-right: none; }

    .tab.active {
      background: var(--purple-50);
      color: var(--purple-800);
      font-weight: 500;
    }

    .tab:hover:not(.active) { background: var(--gray-100); }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--gray-200);
      background: #fff;
      color: var(--gray-800);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .pill.active {
      background: var(--purple-50);
      border-color: var(--purple-200);
      color: var(--purple-800);
      font-weight: 500;
    }

    .pill:hover:not(.active) { background: var(--gray-100); }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    label {
      font-size: 13px;
      color: var(--gray-500);
      display: block;
      margin-bottom: 6px;
    }

    select, textarea {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--gray-200);
      background: #fff;
      color: var(--gray-800);
      font-family: inherit;
    }

    select:focus, textarea:focus {
      outline: none;
      border-color: var(--purple-200);
    }

    textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.5;
    }

    .hint {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 6px;
    }

    .gen-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 500;
      border-radius: var(--radius-md);
      border: none;
      background: var(--purple-600);
      color: #fff;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      margin-top: 0.5rem;
    }

    .gen-btn:hover { background: var(--purple-800); }
    .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result-card {
      background: #fff;
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--gray-200);
      overflow: hidden;
      display: none;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--gray-100);
      border-bottom: 0.5px solid var(--gray-200);
    }

    .result-header span {
      font-size: 13px;
      color: var(--gray-500);
    }

    .copy-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--gray-200);
      background: #fff;
      color: var(--gray-800);
      cursor: pointer;
      font-family: inherit;
    }

    .copy-btn:hover { background: var(--gray-100); }

    .result-content {
      padding: 16px;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      color: var(--gray-800);
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      color: var(--gray-500);
      font-size: 14px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple-600);
      animation: bounce 1s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    @media (max-width: 480px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Generador de contenido</h1>
      <p>Instagram · Tu farmacia</p>
    </header>

    <div class="card">
      <p class="section-label">Formato</p>
      <div class="tab-bar" id="formatTabs">
        <button class="tab active" data-val="post">Post</button>
        <button class="tab" data-val="carrusel">Carrusel</button>
        <button class="tab" data-val="story">Story</button>
      </div>

      <p class="section-label">Tipo de contenido</p>
      <div class="pill-group" id="tipoPills">
        <button class="pill active" data-val="informativo">Informativo / salud</button>
        <button class="pill" data-val="producto">Producto nuevo</button>
        <button class="pill" data-val="promocion">Promoción / oferta</button>
        <button class="pill" data-val="estacional">Estacional</button>
        <button class="pill" data-val="curiosidad">Curiosidad / mito</button>
        <button class="pill" data-val="equipo">El equipo</button>
      </div>

      <div class="grid-2">
        <div>
          <label>Tono de voz</label>
          <select id="tono">
            <option value="cercano y profesional">Cercano y profesional</option>
            <option value="muy informal y divertido">Informal y divertido</option>
            <option value="técnico y riguroso">Técnico y riguroso</option>
            <option value="cálido y empático">Cálido y empático</option>
          </select>
        </div>
        <div>
          <label>Idioma</label>
          <select id="idioma">
            <option value="español">Español</option>
            <option value="inglés">Inglés</option>
          </select>
        </div>
      </div>

      <label>Tema o producto <span style="font-weight:400;color:#aaa">(opcional)</span></label>
      <textarea id="tema" placeholder="Ej: vitamina D en invierno, protector solar SPF50, descuento del 20% en dermocosmética..."></textarea>
      <p class="hint">Si lo dejas vacío, Claude elegirá un tema relevante.</p>

      <button class="gen-btn" id="genBtn" onclick="generar()">Generar contenido</button>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span id="resultLabel">Resultado</span>
        <button class="copy-btn" onclick="copiar()">Copiar texto</button>
      </div>
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    let formato = 'post';
    let tipo = 'informativo';

    document.querySelectorAll('#formatTabs .tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('#formatTabs .tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        formato = t.dataset.val;
      });
    });

    document.querySelectorAll('#tipoPills .pill').forEach(p => {
      p.addEventListener('click', () => {
        document.querySelectorAll('#tipoPills .pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
        tipo = p.dataset.val;
      });
    });

    async function generar() {
      const btn = document.getElementById('genBtn');
      const card = document.getElementById('resultCard');
      const content = document.getElementById('resultContent');
      const label = document.getElementById('resultLabel');

      btn.disabled = true;
      card.style.display = 'block';
      label.textContent = `${formato.charAt(0).toUpperCase() + formato.slice(1)} · ${tipo}`;
      content.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Generando...</span></div>';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            formato,
            tipo,
            tema: document.getElementById('tema').value.trim(),
            tono: document.getElementById('tono').value,
            idioma: document.getElementById('idioma').value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          content.innerHTML = `<div class="result-content" style="color:#c0392b">Error: ${data.error || 'Error desconocido'}</div>`;
        } else {
          content.innerHTML = `<div class="result-content">${data.content}</div>`;
        }
      } catch (e) {
        content.innerHTML = `<div class="result-content" style="color:#c0392b">Error de conexión. Comprueba tu configuración.</div>`;
      }

      btn.disabled = false;
    }

    function copiar() {
      const text = document.querySelector('.result-content')?.innerText || '';
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copiado ✓';
        setTimeout(() => btn.textContent = 'Copiar texto', 2000);
      });
    }
  </script>
</body>
</html>
